name: Issue Label Commenter

on:
  issues:
    types: [labeled]

jobs:
  comment-on-label:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const label = context.payload.label.name;
            
            let comment = '';
            if (label === 'completed') {
              comment = 'This issue has been resolved. Thank you for your contribution!';
            } else if (label === 'feature') {
              comment = 'Thank you for the feature request. We will consider including this in a future release.';
            }
            
            if (comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });
            }
